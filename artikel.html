<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#167a58">
    <title>Artikelstamm</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="app-icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css?v=20260609-5">
    <script src="xlsx.full.min.js" defer></script>
    <script src="artikel.js?v=20260609-16" defer></script>
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Lager</p>
        <h1>Artikelstamm</h1>
      </div>
      <div class="header-actions">
        <div id="connectionBadge" class="connection-badge is-checking" role="status" aria-live="polite">
          <span class="connection-dot" aria-hidden="true"></span>
          <span id="connectionText">Prüfe Verbindung</span>
        </div>
        <label class="warehouse-picker">
          Lager
          <select id="warehouseSelect">
            <option value="SSI">SSI</option>
            <option value="SI">SI</option>
          </select>
        </label>
        <nav class="mode-nav" aria-label="Arbeitsbereich">
          <a class="mode-button" href="/">Kommissionierung</a>
          <a id="storageAppLink" class="mode-button" href="/lager.html">Einlagern</a>
          <a class="mode-button" href="/lager.html?ansicht=artikeluebersicht">Artikelübersicht</a>
          <span class="mode-button is-active">Artikelstamm</span>
          <a class="mode-button" href="/auswertungen.html">Auswertungen</a>
        </nav>
        <div class="user-chip" aria-label="Angemeldeter Mitarbeiter">
          <span id="currentUserName">Nicht angemeldet</span>
          <button id="switchUserButton" class="secondary-button" type="button">Wechseln</button>
        </div>
      </div>
    </header>

    <main class="app-shell article-shell">
      <section class="toolbar article-toolbar" aria-label="Artikel suchen und importieren">
        <label>
          Suche
          <input id="searchInput" type="search" autocomplete="off" placeholder="Materialnummer oder Bezeichnung">
        </label>
        <label class="inline-check">
          <input id="includeInactiveInput" type="checkbox">
          <span>Inaktive anzeigen</span>
        </label>
        <div class="stacked-actions">
          <button id="newArticleButton" class="primary-button" type="button">Neuer Artikel</button>
          <label class="secondary-button file-button">
            Excel/CSV importieren
            <input id="csvInput" type="file" accept=".xls,.xlsx,.csv,.html,.htm,text/csv" multiple>
          </label>
          <a id="exportLink" class="secondary-button link-button" href="/api/articles/export">CSV exportieren</a>
          <button id="resetArticleDataButton" class="danger-button" type="button">Artikelstamm löschen</button>
        </div>
        <p id="articleStatus" class="export-status" role="status">Artikel werden geladen...</p>
      </section>

      <section class="article-layout">
        <div class="list-panel">
          <div class="section-heading">
            <h2>Artikelliste</h2>
            <span id="articleCount" class="muted-count">0 Artikel</span>
          </div>
          <div class="article-table-wrap">
            <table class="article-table">
              <thead>
                <tr>
                  <th><button class="table-sort-button" type="button" data-article-sort="materialnummer">Artikelnummer</button></th>
                  <th><button class="table-sort-button" type="button" data-article-sort="materialbezeichnung">Artikelbezeichnung</button></th>
                  <th><button class="table-sort-button" type="button" data-article-sort="gebindeArt">Gebindeart</button></th>
                  <th><button class="table-sort-button" type="button" data-article-sort="mengeProKarton">Menge pro Gebinde</button></th>
                  <th><button class="table-sort-button" type="button" data-article-sort="mengeProPalette">Menge pro Palette</button></th>
                  <th><button class="table-sort-button" type="button" data-article-sort="gesamtStueck">Gesamtstückzahl</button></th>
                  <th><button class="table-sort-button" type="button" data-article-sort="status">Status</button></th>
                </tr>
              </thead>
              <tbody id="articleTableBody"></tbody>
            </table>
          </div>
        </div>
      </section>

      <div id="articleEditorOverlay" class="login-overlay article-editor-overlay" hidden>
        <aside class="summary-box article-editor">
          <div class="article-editor-head">
            <h2 id="editorTitle">Neuer Artikel</h2>
            <button id="closeEditorButton" class="secondary-button editor-close" type="button" aria-label="Schließen">✕</button>
          </div>
          <form id="articleForm" class="article-form">
            <label>
              Materialnummer
              <input id="materialnummerInput" name="materialnummer" type="text" autocomplete="off" required>
            </label>
            <label>
              Materialbezeichnung
              <input id="materialbezeichnungInput" name="materialbezeichnung" type="text" autocomplete="off" required>
            </label>
            <label>
              Gebinde
              <select id="gebindeArtInput" name="gebindeArt" required>
                <option value="C1">C1</option>
                <option value="C2">C2</option>
                <option value="A1">A1</option>
                <option value="KRT">KRT</option>
                <option value="STK">STK</option>
              </select>
            </label>
            <div class="two-columns">
              <label id="mengeProKartonField" hidden>
                <span id="mengeProKartonLabel">Menge pro KRT</span>
                <input id="mengeProKartonInput" name="mengeProKarton" type="number" inputmode="numeric" min="1" step="1">
              </label>
              <label>
                Menge pro Palette
                <input id="mengeProPaletteInput" name="mengeProPalette" type="number" inputmode="numeric" min="0" step="1">
              </label>
            </div>
            <label>
              Artikelgruppe
              <input id="artikelgruppeInput" name="artikelgruppe" type="text" autocomplete="off">
            </label>
            <label>
              Bemerkung
              <textarea id="bemerkungInput" name="bemerkung" rows="3"></textarea>
            </label>
            <label class="inline-check">
              <input id="aktivInput" name="aktiv" type="checkbox" checked>
              <span>Aktiv</span>
            </label>
            <div class="stacked-actions">
              <button class="primary-button" type="submit">Speichern</button>
              <button id="deactivateButton" class="danger-button" type="button">Deaktivieren</button>
              <button id="permanentDeleteButton" class="danger-button danger-button-strong" type="button">Endgültig löschen</button>
            </div>
            <p id="editorStatus" class="export-status" role="status"></p>
          </form>
        </aside>
      </div>
    </main>
  </body>
</html>
