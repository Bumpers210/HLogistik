<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#167a58">
    <title>Tablet Logistik</title>
    <link rel="icon" href="app-icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="tablet.css?v=20260622-2">
    <script src="offline-store.js?v=20260622-1"></script>
    <script src="tablet-legacy.js?v=20260622-5"></script>
  </head>
  <body>
    <header class="tablet-header">
      <div>
        <p>Lager</p>
        <h1 id="tabletTitle">Tablet Pickliste</h1>
      </div>
      <div id="connectionStatus" class="connection-status">Prüfe Verbindung</div>
    </header>

    <main class="tablet-shell">
      <section class="tablet-controls">
        <div class="tablet-mode-switch" role="group" aria-label="Arbeitsbereich">
          <button id="pickingModeButton" type="button" class="is-active">Kommissionierung</button>
          <button id="storageModeButton" type="button">Einlagerung</button>
        </div>
        <div class="tablet-control-fields">
          <label>
            Mitarbeiter
            <input id="userNameInput" type="text" autocomplete="name" placeholder="Name">
          </label>
          <label>
            Auftrag
            <select id="orderSelect">
              <option value="">Auftrag wählen</option>
            </select>
          </label>
          <div id="acceptedGroupInfo" class="tablet-group-info" hidden></div>
          <label>
            Sortierung
            <select id="sortModeSelect">
              <option value="fromBin">Lagerplatz</option>
              <option value="product">Artikelnummer</option>
            </select>
          </label>
        </div>
        <div class="tablet-manual-fields">
          <label id="manualStorageCustomerRow" hidden>
            Kunde
            <input id="manualStorageCustomerInput" type="text" autocomplete="off" autocapitalize="words" placeholder="Kunde">
          </label>
          <label id="manualStorageWarehouseRow" hidden>
            Lager
            <select id="manualStorageWarehouseSelect">
              <option value="SSI">SSI</option>
              <option value="SI">SI</option>
            </select>
          </label>
        </div>
        <div class="tablet-action-row tablet-action-row-main">
          <button id="refreshButton" type="button">Aktualisieren</button>
          <button id="saveButton" type="button">Jetzt speichern</button>
          <button id="manualStorageStartButton" type="button" hidden>Manuelle Einlagerung starten</button>
          <button id="takeOverButton" type="button" hidden>Bearbeitung übernehmen</button>
          <button id="exportPdfButton" type="button">PDF exportieren</button>
        </div>
        <div class="tablet-action-row tablet-action-row-danger">
          <button id="leaveOrderButton" class="danger-action" type="button" hidden>Auftrag verlassen</button>
          <button id="discardOrderButton" class="danger-action" type="button" hidden>Einlagerung abbrechen</button>
        </div>
      </section>

      <section class="tablet-status">
        <div><strong id="doneCount">0</strong><span>erledigt</span></div>
        <div><strong id="openCount">0</strong><span>offen</span></div>
        <div><strong id="changedCount">0</strong><span>korrigiert</span></div>
      </section>

      <p id="message" class="message">Bitte Auftrag laden.</p>
      <section id="tabletListPanel" class="tablet-list-panel" hidden>
        <div id="pickHeader" class="pick-column-header" hidden>
          <span></span>
          <div class="pick-column-grid">
            <span>Artikelnummer</span>
            <span>Lagerplatz</span>
            <span>Produktbeschreibung</span>
            <span>Soll</span>
            <span>Ist</span>
            <span>Einheit</span>
          </div>
        </div>
        <section id="lineList" class="line-list"></section>
        <div id="storageLineActions" class="tablet-line-actions" hidden>
          <label>
            Material
            <input id="manualStorageMaterialInput" type="text" inputmode="numeric" pattern="[0-9]*" autocomplete="off" placeholder="Artikelnummer">
          </label>
          <label>
            Anzahl Positionen
            <input id="manualStoragePositionCountInput" type="number" inputmode="numeric" min="1" max="100" step="1" value="1">
          </label>
          <button id="addStorageLineButton" type="button">Positionen anlegen</button>
        </div>
      </section>
      <section class="tablet-completion" aria-label="Abschluss">
        <label>
          Europaletten
          <input id="euroPalletsInput" type="number" inputmode="decimal" min="0" step="0.5" placeholder="0">
        </label>
        <label>
          Stellplätze
          <input id="storageSpacesInput" type="number" inputmode="decimal" min="0" step="0.5" placeholder="0">
        </label>
        <label>
          Notiz
          <textarea id="orderNoteInput" rows="3" placeholder="Schäden, Fehlmengen, Besonderheiten"></textarea>
        </label>
      </section>
    </main>
  </body>
</html>
